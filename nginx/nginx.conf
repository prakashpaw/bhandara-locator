server {
    listen 80;

    location / {
        proxy_pass http://bhandara_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://bhandara_backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://bhandara_backend:5000;
        proxy_set_header Host $host;
    }
}