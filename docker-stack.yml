version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bhandara_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bhandara_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    image: bhandara_backend:latest
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bhandara_db
    networks:
      - bhandara_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
    depends_on:
      - postgres

  frontend:
    image: bhandara_frontend:latest
    networks:
      - bhandara_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - bhandara_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  bhandara_network:
    driver: overlay

volumes:
  postgres_data:

configs:
  nginx_config:
    file: ./nginx/nginx.conf  