version: '3.8'

services:

  backend:
    image: pawarpr/bhandara_backend:latest
    environment:
      PORT: 5000
      DB_HOST: bhandara-db.c1aosco8m9ty.ap-south-1.rds.amazonaws.com
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: bhandara_db
      JWT_SECRET: bhandara_super_secret_key_2024 # Added Secret Key
    networks:
      - bhandara_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  frontend:
    image: pawarpr/bhandara_frontend:latest
    networks:
      - bhandara_network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - bhandara_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

networks:
  bhandara_network:
    driver: overlay

configs:
  nginx_config:
    file: ./nginx/nginx.conf